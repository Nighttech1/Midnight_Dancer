plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

// Релизная подпись: пароли из переменных окружения имеют приоритет (Codemagic / CI),
// затем android/key.properties. Файл ключа по умолчанию — ../Ключи/upload-keystore.jks (не в git).
def midnightStorePathRaw = System.getenv('MIDNIGHT_UPLOAD_KEYSTORE')
        ?: keystoreProperties['storeFile']
        ?: '../Ключи/upload-keystore.jks'
// Пути относительно папки android/; абсолютный путь тоже поддерживается.
def midnightStoreFile = rootProject.file(midnightStorePathRaw)
def midnightStorePassword = System.getenv('MIDNIGHT_UPLOAD_STORE_PASSWORD') ?: keystoreProperties['storePassword']
def midnightKeyPassword = System.getenv('MIDNIGHT_UPLOAD_KEY_PASSWORD') ?: keystoreProperties['keyPassword']
def midnightKeyAlias = System.getenv('MIDNIGHT_UPLOAD_KEY_ALIAS') ?: keystoreProperties['keyAlias'] ?: 'upload'
def useMidnightReleaseSigning = midnightStoreFile.exists() && midnightStorePassword && midnightKeyPassword

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0.0'
}

android {
    namespace "com.midnightdancer.app"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.midnightdancer.app"
        minSdkVersion flutter.minSdkVersion
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    // Разные applicationId: lite / standard / english — с суффиксом. Full — базовый com.midnightdancer.app (один ID с Google Play / RuStore).
    flavorDimensions += "app"
    productFlavors {
        lite {
            dimension "app"
            applicationIdSuffix ".lite"
        }
        standard {
            dimension "app"
            applicationIdSuffix ".standard"
        }
        full {
            dimension "app"
        }
        english {
            dimension "app"
            applicationIdSuffix ".english"
        }
        // Узкий APK: те же 3 голоса и com.midnightdancer.app, что full. Один ABI — через сборку (см. BUILD.md: --split-per-abi или --target-platform).
        playverify {
            dimension "app"
        }
    }

    signingConfigs {
        if (useMidnightReleaseSigning) {
            release {
                storeFile midnightStoreFile
                storePassword midnightStorePassword
                keyAlias midnightKeyAlias
                keyPassword midnightKeyPassword
            }
        }
    }

    buildTypes {
        release {
            signingConfig useMidnightReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
